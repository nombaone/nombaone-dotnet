name: Release

# Merge-triggered CD. On push to main: run the gate, pack, and publish to NuGet
# only when the manifest <Version> is new (--skip-duplicate no-ops otherwise).
# A merge that does not bump <Version> in src/NombaOne/NombaOne.csproj is a no-op.
on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Format check
        run: dotnet format --verify-no-changes --severity warn

      - name: Build (Release, both target frameworks)
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build

      - name: Pack
        run: dotnet pack src/NombaOne/NombaOne.csproj -c Release --no-build -o artifacts

      # Publish only if this version is new (--skip-duplicate no-ops an existing
      # version). If NUGET_API_KEY isn't configured yet, skip with an actionable
      # notice instead of failing red — so merges stay green until the one-time
      # NuGet setup in PUBLISHING.md is done.
      - name: Publish to NuGet (skips cleanly until a key is configured)
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "::notice::NUGET_API_KEY secret is not set — skipping publish. Add it (or enable Trusted Publishing) per PUBLISHING.md, then re-run this workflow."
            exit 0
          fi
          dotnet nuget push "artifacts/*.nupkg" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
