name: Release

# Merge-triggered CD via NuGet Trusted Publishing (OIDC — no stored secret).
# On push to main: run the gate, pack, and publish. Publishing an already-live
# <Version> is the ONE deliberate green no-op (--skip-duplicate, for merges that
# don't bump the version). Every other outcome — missing config, OIDC/auth
# failure, upload error — fails the job RED, so you never see green while the
# package is not actually live.
on:
  push:
    branches: [main]

permissions:
  id-token: write # OIDC token exchanged for a short-lived NuGet key
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Format check
        run: dotnet format --verify-no-changes --severity warn

      - name: Build (Release, both target frameworks)
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build

      - name: Pack
        run: dotnet pack src/NombaOne/NombaOne.csproj -c Release --no-build -o artifacts

      # A release build that cannot publish must be red, never a misleading green.
      - name: Require publish configuration
        run: |
          if [ -z "${{ vars.NUGET_USER }}" ]; then
            echo "::error::NUGET_USER repo variable is not set. Set it to your nuget.org username (Settings -> Secrets and variables -> Actions -> Variables) and add a Trusted Publishing policy for package NombaOne pointing at this repo + release.yml (see PUBLISHING.md)."
            exit 1
          fi

      # Exchange this workflow's OIDC token for a short-lived NuGet API key.
      - name: NuGet login (OIDC Trusted Publishing)
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_USER }}

      # --skip-duplicate makes ONLY the "this exact version is already published"
      # case a green no-op (the intended behavior when a merge doesn't bump
      # <Version>). Auth, upload, and config errors still fail red.
      - name: Publish to NuGet
        run: dotnet nuget push "artifacts/*.nupkg" --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
