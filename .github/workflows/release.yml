name: Release

# Merge-triggered CD via NuGet Trusted Publishing (OIDC — no stored secret).
# On push to main: run the gate, pack, and publish only when the manifest
# <Version> is new (--skip-duplicate no-ops otherwise). A merge that does not
# bump <Version> in src/NombaOne/NombaOne.csproj is a no-op.
on:
  push:
    branches: [main]

permissions:
  id-token: write # OIDC token exchanged for a short-lived NuGet key
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Format check
        run: dotnet format --verify-no-changes --severity warn

      - name: Build (Release, both target frameworks)
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build

      - name: Pack
        run: dotnet pack src/NombaOne/NombaOne.csproj -c Release --no-build -o artifacts

      # Exchange this workflow's OIDC token for a short-lived NuGet API key.
      # Requires a Trusted Publishing policy on nuget.org for package NombaOne
      # pointing at this repo + workflow, and the repo variable NUGET_USER
      # (your nuget.org username). Skips cleanly until NUGET_USER is set.
      - name: NuGet login (OIDC Trusted Publishing)
        id: login
        if: ${{ vars.NUGET_USER != '' }}
        uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_USER }}

      # Publish only if this version is new (--skip-duplicate no-ops an existing one).
      - name: Publish to NuGet
        if: ${{ vars.NUGET_USER != '' }}
        run: dotnet nuget push "artifacts/*.nupkg" --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Publishing not configured yet
        if: ${{ vars.NUGET_USER == '' }}
        run: echo "::notice::Set the repo variable NUGET_USER and a Trusted Publishing policy on nuget.org (see PUBLISHING.md) to enable publishing."
